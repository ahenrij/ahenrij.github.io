<footer class="relative px-4 pt-4 pb-4">
  
  <!-- divider -->
  <div class="relative my-8">
    <div class="absolute inset-0 flex items-center" aria-hidden="true">
      <div class="theme-divider w-full border-t"></div>
    </div>
    <div class="relative flex justify-center ">
      <span class="theme-divider-bg theme-muted px-2">
        <i class="text-xs far fa-circle"></i>
      </span>
    </div>
  </div>

  <!-- footer msg -->
  <div class="flex flex-wrap items-center justify-center">
    <div class="theme-muted text-sm">
      © <span id="get-current-year"></span>
      {% if site.footer-msg %}
      <a href="{{site.footer-msg-link}}" class="theme-muted !no-underline">
        {{site.footer-msg}}
      </a>
      {% endif %}
    </div>
  </div>
  </div>
</footer>
